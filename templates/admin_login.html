<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login | Digi-Tech</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/admin-auth.css" />
  </head>
  <body>
    <main class="auth-shell">
      <section class="auth-card">
        <p class="eyebrow">Admin Access</p>
        <h1>Sign in to Dashboard</h1>
        <p class="helper">Manage projects, payments, and milestones securely.</p>

        {% if error %}
        <p class="error-message" role="alert">{{ error }}</p>
        {% endif %}

        <form method="post" action="{{ url_for('admin_login', next=request.args.get('next', '')) }}" class="auth-form">
          <label>
            Email
            <input name="email" type="email" required value="{{ prefill_email }}" />
          </label>
          <label>
            Password
            <input name="password" type="password" required autocomplete="current-password" />
          </label>
          <button type="submit">Sign in</button>
        </form>

        <a href="/">Back to website</a>
      </section>
    </main>
  </body>
</html>
